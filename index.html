<style>
/* ========= RESET & BASE ========= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --teal: #005154;
  --teal-light: #007a7e;
  --teal-dark: #003638;
  --black: #000000;
  --white: #FFFFFF;
  --accent: #f5a623;
  --accent-hover: #ffb840;
  --gray: #1a1a1a;
  --gray-light: #2a2a2a;
  --text-muted: #b8b8b8;
  --radius: 16px;
  --shadow: 0 20px 60px rgba(0,0,0,0.4);
  --transition: 0.35s cubic-bezier(.4,0,.2,1);
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--black);
  color: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

/* ========= ANIMATED BACKGROUND ========= */
.bg-grid {
  position: fixed; inset: 0; z-index: -2;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,81,84,0.35) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(0,81,84,0.25) 0%, transparent 50%),
    #000;
}
.bg-grid::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
}

/* ========= HEADER ========= */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 14px 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  transition: var(--transition);
}
.header.scrolled { padding: 10px 0; background: rgba(0,0,0,0.85); }
.header-inner { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
.logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 20px; }
.logo-mark {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, var(--teal), var(--teal-light));
  display: grid; place-items: center;
  box-shadow: 0 8px 24px rgba(0,81,84,0.5);
}
.logo-mark svg { width: 22px; height: 22px; }
.logo-text { display: flex; flex-direction: column; line-height: 1; }
.logo-text b { font-size: 16px; letter-spacing: 0.5px; }
.logo-text span { font-size: 10px; color: var(--accent); letter-spacing: 2px; margin-top: 3px; }
.header-actions { display: flex; align-items: center; gap: 16px; }
.phone-link { font-weight: 700; font-size: 16px; transition: color var(--transition); white-space: nowrap; }
.phone-link:hover { color: var(--accent); }
.btn-tg {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: 999px;
  background: rgba(255,255,255,0.08); font-weight: 600; font-size: 14px;
  border: 1px solid rgba(255,255,255,0.12); transition: var(--transition);
}
.btn-tg:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
.btn-primary {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  padding: 14px 28px; border-radius: 999px;
  background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  color: #000; font-weight: 700; font-size: 15px;
  box-shadow: 0 10px 30px rgba(245,166,35,0.35);
  transition: var(--transition); white-space: nowrap;
}
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(245,166,35,0.5); }
.btn-primary:active { transform: translateY(-1px); }

.burger { display: none; width: 40px; height: 40px; flex-direction: column; justify-content: center; gap: 5px; padding: 10px; }
.burger span { display: block; width: 100%; height: 2px; background: #fff; transition: var(--transition); }

/* ========= HERO ========= */
.hero {
  position: relative; min-height: 100vh;
  padding: 140px 0 80px;
  display: flex; align-items: center;
  overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0; z-index: -1;

.hero-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 60px; align-items: center; }

}
.hero h1 {

  letter-spacing: -0.02em; margin-bottom: 24px;

}
.hero h1 .accent-text {
  background: linear-gradient(135deg, var(--accent), #ffd27a);

}
.hero-sub {
  font-size: clamp(16px, 1.8vw, 19px); color: var(--text-muted);

}
.hero-cta { display: flex; flex-wrap: wrap; gap: 14px; animation: fadeUp 0.8s 0.3s ease both; }
.btn-secondary {

  background: rgba(255,255,255,0.06); color: #fff; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.15); transition: var(--transition);
}
.btn-secondary:hover { background: rgba(255,255,255,0.12); transform: translateY(-3px); }

.hero-visual {

.hero-card {

  border: 1px solid rgba(255,255,255,0.08);
}
.hero-card::before {
  content: ''; position: absolute; inset: 0;

    radial-gradient(circle at 80% 20%, rgba(245,166,35,0.25), transparent 50%),

}
.hero-car-shape {
  position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);

  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
  animation: floaty 4s ease-in-out infinite;
}
@keyframes floaty {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-12px); }
}
.hero-card-label {
  position: absolute; top: 24px; left: 24px;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
  padding: 8px 14px; border-radius: 999px; font-size: 12px;
  font-weight: 600; letter-spacing: 1px;
}
.hero-stats {
  position: absolute; bottom: 24px; left: 24px; right: 24px;
  display: grid; grid-template-columns: repeat(3,1fr); gap: 12px;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(12px);
  padding: 18px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1);
}
.stat-item { text-align: center; }
.stat-num { font-size: clamp(18px,2.5vw,26px); font-weight: 800; color: var(--accent); }
.stat-label { font-size: 11px; color: #ccc; text-transform: uppercase; letter-spacing: 1px; }

/* ========= SECTIONS ========= */
section { padding: 90px 0; position: relative; }
.section-title {
  text-align: center; font-size: clamp(28px,4vw,48px);

}
.section-subtitle {

}

}

/* ========= COMPARISON ========= */
.compare {
  background: linear-gradient(180deg, transparent, rgba(0,81,84,0.08), transparent);
}
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 40px; }
.compare-col {
  border-radius: var(--radius); padding: 32px 28px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
}
.compare-col.bad { background: linear-gradient(180deg, rgba(80,20,20,0.25), rgba(255,255,255,0.02)); border-color: rgba(255,80,80,0.18); }
.compare-col.good { background: linear-gradient(180deg, rgba(0,81,84,0.4), rgba(0,81,84,0.1)); border-color: rgba(0,200,200,0.25); }
.compare-col h3 {
  font-size: 20px; font-weight: 800; margin-bottom: 24px; padding-bottom: 18px;
  border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px;
}
.compare-list { list-style: none; display: flex; flex-direction: column; gap: 16px; }
.compare-list li {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 14px 16px; border-radius: 12px;
  background: rgba(0,0,0,0.25); font-size: 15px; line-height: 1.5;
}
.compare-icon {
  flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%;
  display: grid; place-items: center; margin-top: 1px;
}
.bad .compare-icon { background: rgba(255,80,80,0.2); color: #ff7676; }
.good .compare-icon { background: rgba(0,255,180,0.15); color: #4ade80; }

/* ========= WHY ========= */
.why { background: linear-gradient(180deg, transparent, rgba(0,81,84,0.06)); }
.why-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
.why-text h2 { font-size: clamp(26px,3.5vw,42px); font-weight: 900; line-height: 1.15; margin-bottom: 20px; }

}
.why-card:hover { transform: translateY(-6px); border-color: var(--accent); }
.why-icon {
  width: 48px; height: 48px; border-radius: 12px;

.why-card h4 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }

/* ========= EXPERT ========= */
.expert-block {
  background: linear-gradient(135deg, var(--teal), var(--teal-dark));

  border: 1px solid rgba(255,255,255,0.1);
}
.expert-block::before {

}

/* ========= PRICE ========= */

  font-size: 12px; font-weight: 700; letter-spacing: 1px; margin-bottom: 16px;
}

/* ========= VARIANTS ========= */
.variants { background: linear-gradient(180deg, transparent, rgba(0,81,84,0.08), transparent); }
.variants-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; margin-top: 30px; }

}
.variant-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;

/* ========= CTA SECTION ========= */

}
